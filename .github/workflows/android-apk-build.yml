name: Android APK Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build debug and release APKs
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      HAS_RELEASE_SIGNING: ${{ secrets.SIGNING_KEY != '' && secrets.ALIAS != '' && secrets.KEY_STORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Android SDK components
        id: cache_android_sdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-35
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
            ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          key: android-sdk-${{ runner.os }}-api35-build-tools35.0.0-cmake3.22.1-ndk27.0.12077973

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "$ANDROID_HOME/platforms/android-35"
            "$ANDROID_HOME/build-tools/35.0.0"
            "$ANDROID_HOME/cmake/3.22.1"
            "$ANDROID_HOME/ndk/27.0.12077973"
          )

          missing=false
          for path in "${required_paths[@]}"; do
            if [[ ! -d "$path" ]]; then
              echo "Missing Android SDK component: $path"
              missing=true
            fi
          done

          if [[ "$missing" == "true" ]]; then
            sdkmanager "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;27.0.12077973"
          else
            echo "Android SDK components restored from cache or already installed."
          fi

      - name: Resolve action build version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            function fallbackVersionFromGradle() {
              const gradleFile = fs.readFileSync('app/build.gradle.kts', 'utf8');
              const match = gradleFile.match(/versionName\s*=\s*"([^"]+)"/);
              const versionName = match?.[1] || '0.0.0';
              return versionName.startsWith('v') ? versionName : `v${versionName}`;
            }

            let baseVersion;
            try {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              baseVersion = latestRelease.data.tag_name;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              baseVersion = fallbackVersionFromGradle();
            }

            const safeBaseVersion = baseVersion.replace(/[^0-9A-Za-z._-]/g, '-');
            const buildVersion = `${safeBaseVersion}-action.${context.runNumber}`;

            core.info(`Base release version: ${baseVersion}`);
            core.info(`Action build version: ${buildVersion}`);
            core.setOutput('base_version', baseVersion);
            core.setOutput('build_version', buildVersion);

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --build-cache

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --build-cache

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --build-cache

      - name: Sign release APK
        id: sign_release
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.0'

      - name: Collect APKs
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          SIGNED_RELEASE_FILE: ${{ steps.sign_release.outputs.signedReleaseFile }}
        shell: bash
        run: |
          set -euo pipefail

          output_dir="build/action-apks"
          mkdir -p "$output_dir"

          cp "app/build/outputs/apk/debug/app-debug.apk" \
            "$output_dir/SeamlessLoopMobile-${BUILD_VERSION}-debug.apk"

          if [[ -n "${SIGNED_RELEASE_FILE}" && -f "${SIGNED_RELEASE_FILE}" ]]; then
            cp "${SIGNED_RELEASE_FILE}" \
              "$output_dir/SeamlessLoopMobile-${BUILD_VERSION}-release.apk"
          elif [[ -f "app/build/outputs/apk/release/app-release.apk" ]]; then
            cp "app/build/outputs/apk/release/app-release.apk" \
              "$output_dir/SeamlessLoopMobile-${BUILD_VERSION}-release.apk"
          elif [[ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]]; then
            cp "app/build/outputs/apk/release/app-release-unsigned.apk" \
              "$output_dir/SeamlessLoopMobile-${BUILD_VERSION}-release-unsigned.apk"
          else
            echo "No release APK found." >&2
            find app/build/outputs/apk -type f -name "*.apk" -print >&2
            exit 1
          fi

          ls -lh "$output_dir"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: SeamlessLoopMobile-${{ steps.version.outputs.build_version }}
          path: build/action-apks/*.apk
          if-no-files-found: error
          retention-days: 30
          overwrite: true

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-reports-${{ github.run_number }}
          path: |
            app/build/reports/**
            app/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
